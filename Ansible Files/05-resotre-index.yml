---
- name: Deploy configuration file
  hosts: webservers
  become: yes
  tasks:
    - name: Create directory
      file:
        path: /var/www/html
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'
    - name: Copy config file
      copy:
        src: index.html
        dest: /var/www/html/index.html
      notify: Restart nginx
  handlers:
    - name: Restart nginx
      service:
        name: nginx
        state: restarted
