---
- name: Deploy website
  hosts: webservers
  become: yes
  tasks:
    - name: Create directory
      file:
        path: /var/www/html
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'
    - name: Create index page
      copy:
        content: "<h1>Hello UnixTools Students</h1>"
        dest: /var/www/html/index.html
